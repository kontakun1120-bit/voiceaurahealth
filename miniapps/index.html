<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="manifest" href="/static/manifest.json">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="application-name" content="VoiceAuraHealth">
<meta name="apple-mobile-web-app-title" content="VoiceAuraHealth">

<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service_worker.js');
}

</script>

<title>VoiceAuraHealth™ mini</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f8;
    text-align:center;
    padding:30px;
}

h1{
    font-size:34px;
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

.logo{
    width:200px;
    margin:20px auto;
    display:block;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    max-width:420px;
    margin:auto;
}

.metric{
    margin:18px 0;
}

.label{
font-weight:600;
margin-bottom:4px;
}

.item{
margin-top:10px;
}

.bar{
    width:100%;
    height:18px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.fill{
height:18px;
background:#4CAF50;
transition:width 0.6s;
}

button{
background:#4CAF50;
border:none;
color:white;
padding:14px 26px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

button:active{
transform:scale(0.96);
}

#status{
    margin-top:10px;
    color:#666;
    font-size:16px;
}

#time{
margin-top:10px;
font-size:14px;
color:#777;
}

.star{
font-size:14px;
color:#666;
margin-top:4px;
}

.fill-green{
background:#4CAF50;
}

.fill-red{
background:#e53935;
}

.comment{
margin-top:6px;
font-size:14px;
color:#555;
font-style:italic;
}

</style>

</head>


<body>

<h1>VoiceAuraHealth™</h1>
<h1> mini v1.3</h1>
<div class="subtitle">Voice State Analyzer (5 sec)</div>

<div class="card">

<img src="/static/icon.png" class="logo">

<button onclick="analyze()">🎤 Speak</button>

<div id="time"></div>

<div id="status"></div>
<div id="result"></div>

<div class="footer">
 </br>
VoiceAuraHealth™ mini</br>
Voice-based mental & health AI</br>
</br>
 — こんどう泌尿器科・</br>
       内科クリニック — 
</div>

</div>


<script>

function stars(value){

let s = Math.round(value/20) // 0〜100 → 0〜5

let star=""

for(let i=0;i<5;i++){

if(i<s){
star+="★"
}else{
star+="☆"
}

}

return star
}


function bar(name,val){

let color="fill-green"
let starline=""

if(name.includes("Stress")){
    color="fill-red"
    starline=`<div class="star">良い ${stars(val)} 悪い</div>`
}

return `
<div class="item">

<div class="label">
${name} : ${val}
</div>

<div class="bar">
<div class="fill ${color}" style="width:${val}%"></div>
</div>

${starline}

</div>
`
}

function showTime(){

const now = new Date()

const text =
now.getFullYear()+"-"+
String(now.getMonth()+1).padStart(2,'0')+"-"+
String(now.getDate()).padStart(2,'0')+" "+
String(now.getHours()).padStart(2,'0')+":"+
String(now.getMinutes()).padStart(2,'0')+":"+
String(now.getSeconds()).padStart(2,'0')

document.getElementById("time").innerText =
"測定日時 : "+text
}

function analyze(){

// 画面リセット
document.getElementById("result").innerHTML=""
document.getElementById("time").innerHTML=""

document.getElementById("status").innerHTML="🎤 Recording..."

fetch("/analyze")
.then(r=>r.json())
.then(data=>{

document.getElementById("status").innerHTML="🧠 Analyzing..."

showTime()




let html=""

html+=bar("ストレス（Stress）",data.Stress)
html+=`
<div class="comment">
${data.StressComment}
</div>
`
html+=`
<div class="comment">
あなたは ${data.Personality} タイプです
</div>
`

html+=`
<div class="comment">
Aura Color : ${data.ColorSector}
</div>
`
<br>
html+=bar("疲労（Fatigue）",data.Fatigue)
html+=bar("集中（Focus）",data.Focus)
html+=bar("活力（Energy）",data.Energy)
html+=bar("覚醒（Arousal）",data.Arousal)

<br>
html+=bar("社交（Social）",data.Social)
html+=bar("感情（Emotion）",data.Emotion)



document.getElementById("result").innerHTML=html

document.getElementById("status").innerHTML="✔ Done"

})

}

</script>

</body>
</html>
