<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceAuraHealth for You 🌸</title>

<style>
body{
    margin:0;
    font-family: "Hiragino Maru Gothic ProN", sans-serif;
    background: linear-gradient(180deg,#fff1f2,#f0fdf4);
    color:#444;
    text-align:center;
}

.container{
    max-width:400px;
    margin:auto;
    padding:20px;
}

/* ロゴ */
.logo{
    width:180px;
    margin-top:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* タイトル */
h1{
    font-size:22px;
    margin-top:10px;
}

.sub{
    font-size:13px;
    color:#888;
    margin-bottom:20px;
}

/* カード */
.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* ボタン */
.btn{
    padding:14px 28px;
    border:none;
    border-radius:30px;
    background: linear-gradient(90deg,#fda4af,#fbcfe8);
    color:white;
    font-size:15px;
}

/* スコア */
.metric{
    margin-top:20px;
    text-align:left;
}

.bar{
    height:6px;
    background:#eee;
    border-radius:10px;
    margin-top:5px;
}

.fill{
    height:6px;
    border-radius:10px;
}

/* コメント */
.comment{
    font-size:13px;
    margin-top:6px;
    color:#666;
}

/* 星色 */
.star-low{ color:#fda4af; }
.star-mid{ color:#fde68a; }
.star-high{ color:#86efac; }

.time{
    font-size:12px;
    color:#aaa;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<img src="static/main_logo.png" class="logo">

<h1>VoiceAuraHealth for You 🌸</h1>
<p class="sub">あなたの声から、やさしく心の状態を感じとります</p>

<div class="card">
    <button class="btn" onclick="startRecording()">🎙 5秒チェック</button>
    <p id="status"></p>
</div>

<div id="result"></div>

</div>

<script>

async function startRecording() {

    const status = document.getElementById("status");
    const result = document.getElementById("result");

    status.innerText = "録音準備中...";
    result.innerHTML = "";

    let stream;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
        alert("マイク許可が必要です");
        return;
    }

    status.innerText = "録音中...";

    const recorder = new MediaRecorder(stream);
    let chunks = [];

    recorder.ondataavailable = e => {
        chunks.push(e.data);
    };

    recorder.onstop = async () => {

        status.innerText = "解析中...";

        const blob = new Blob(chunks, { type: "audio/webm" });
        const formData = new FormData();
        formData.append("audio", blob);

        try {
            const res = await fetch("/api/upload", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            if (!data.result) {
                status.innerText = "エラー";
                console.log(data);
                return;
            }

            render(data);
            status.innerText = "完了";

        } catch (e) {
            console.error(e);
            status.innerText = "通信エラー";
        }

        stream.getTracks().forEach(track => track.stop());
    };

    recorder.start();

    setTimeout(() => {
        recorder.stop();
    }, 5000);
}

function render(data){
    const r = data.result;
    const s = r.scores;

	const now = new Date();

	const yyyy = now.getFullYear();
	const mm = String(now.getMonth() + 1).padStart(2, "0");
	const dd = String(now.getDate()).padStart(2, "0");
	const hh = String(now.getHours()).padStart(2, "0");
	const mi = String(now.getMinutes()).padStart(2, "0");

	const time = `${yyyy}年${mm}月${dd}日 ${hh}:${mi}`;

    let html = `
    <div class="card">
    <b>あなたの今の状態 🌿</b>
    <div class="time">${time}</div>
    `;

	let prev = localStorage.getItem("energy_prev");

	if(prev){
		let diff = s.Energy - prev;
		html += `<div class="comment">昨日より ${diff}</div>`;
	}

	localStorage.setItem("energy_prev", s.Energy);

    html += metric("元気",s.Energy,r.score_comments.Energy);
    html += metric("気持ち",s.Emotion,r.score_comments.Emotion);
    html += metric("集中",s.Focus,r.score_comments.Focus);
    html += metric("つながり",s.Social,r.score_comments.Social);
    html += metric("リラックス",s.Calm,r.score_comments.Calm);

    html += `</div>`;

	html += `
	<div class="card">
		💭 今のあなたへ
		<div class="comment">${r.summary}</div>
	</div>
	`;

    document.getElementById("result").innerHTML = html;
}

function metric(name,v,comment){

    const stars = Math.round(v/20);

    let c="";
    let bar="#86efac";

    if(v<=30){ c="star-low"; bar="#fda4af"; }
    else if(v<=60){ c="star-mid"; bar="#fde68a"; }
    else{ c="star-high"; }

    return `
    <div class="metric">
        <div>
            ${name}：
            <span class="${c}">
            ${"★".repeat(stars)}${"☆".repeat(5-stars)}
            </span>
            ${v}
        </div>

        <div class="bar">
            <div class="fill" style="width:${v}%;background:${bar}"></div>
        </div>

        <div class="comment">${soft(comment)}</div>
    </div>
    `;
}

function soft(text){
    return text
    .replace("低下","少し低めかも")
    .replace("高","ちょっと高め")
    + "🌿";
}

</script>

</body>
</html>
