<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VoiceAura City</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/city.css">
</head>

<body>

<div class="city-shell">

  <header class="city-hero">
    <div class="badge">VoiceAuraHealth TM</div>
    <h1>VoiceAura City</h1>
    <p>声の記録が、未来の健康になる。</p>
  </header>

  <main class="city-grid">

    <a class="city-card room" href="/room">
      <div class="icon">🏠</div>
      <h2>My Room</h2>
      <p>あなたの声の履歴</p>
    </a>

    <a class="city-card health" href="/health">
      <div class="icon">🏥</div>
      <h2>Health Center</h2>
      <p>ストレスと体調の変化</p>
    </a>

    <a class="city-card lab" href="/lab">
      <div class="icon">🎓</div>
      <h2>Research Lab</h2>
      <p>192次元ベクトル研究</p>
    </a>

    <a class="city-card team" href="/team">
      <div class="icon">🏢</div>
      <h2>Team Office</h2>
      <p>未来のチーム分析</p>
    </a>

  </main>

  <section class="mini-link">
    <p>まず5秒で測るなら</p>
    <a href="https://mini.voiceaurahealth.com">mini.voiceaurahealth.com</a>
  </section>

</div>

</body>
</html>
