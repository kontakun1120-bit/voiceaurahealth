<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='mini_icon.png') }}">
<meta name="theme-color" content="#0f172a">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceAuraHealth (TM)</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    color:#e2e8f0;
    text-align:center;
}

.container {
    max-width:700px;
    margin:40px auto;
    padding:20px;
}


.main-hero-logo {
    width:200px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:30%;
    box-shadow:0 0 60px rgba(0,255,255,0.8);
}


h1 {
    margin-top:15px;
    font-size:32px;
}

.tm {
    font-size:12px;
    opacity:0.7;
}

.card {
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    margin-top:25px;
	
    display:flex;
    flex-direction:column;
    align-items:center;
	
    max-width:380px;
    margin:25px auto 0 auto;
}

.record-btn {
    margin-top:20px;
    padding:16px 36px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background: linear-gradient(90deg,#00f0ff,#ff00c8);
    color:white;
    cursor:pointer;
    box-shadow:0 0 25px rgba(0,255,255,0.6);
    transition:0.3s;

    display:flex;
    align-items:center;
    justify-content:center;
}

.record-btn:hover {
    transform:scale(1.05);
}

.bar {
    margin:10px 0;
    text-align:left;
}

.bar-bg {
    background:#334155;
    height:8px;
    border-radius:4px;
}

.bar-fill {
    background:#22c55e;
    height:8px;
    border-radius:4px;
}

.result-title {
    padding:20px;
    border-radius:12px;
    color:white;
    font-size:22px;
    margin-top:20px;
}

.footer {
    margin-top:40px;
    font-size:12px;
    opacity:0.6;
}

.tm2 {
    font-size:9px;
    opacity:0.7;
}

.tm-black {
  color:#000;
  font-size:12px;
}

.btn-logo {
    width:100px;
    height:100px;
    margin-right:10px;
    vertical-align:middle;
    border-radius:35%;
    box-shadow:0 0 10px rgba(0,255,255,0.7);
	animation: spin 6s linear infinite;
}

.record-btn:disabled {
    cursor: not-allowed;
    box-shadow: none;
}

</style>
</head>

<body>

<div class="container">

    <img src="{{ url_for('static', filename='main_logo.png') }}" class="main-hero-logo">


	<div id="loading-screen">
		<h2>VoiceAuraHealth (TM)</h2>
		<p>🧠 AIエンジン起動中...</p>
		<p>🎙 音声解析準備中...</p>
	</div>
	
	<div id="main-app" style="display:none;">
	
    <h1>VoiceAuraHealth 
	<span class="tm-black">(TM)</span>mini（Beta version）</h1>
    <p>あなたの声から人格エネルギーを可視化</p>


    <div class="card">
	<button class="record-btn" onclick="startRecording()">
		🎙 今日のAuraチェック
	</button>
        <p id="status"></p>
		<span class="tm">( 5秒で測定 )</span>
    </div>

    <div id="resultBox"></div>

    <div class="footer">
	<font color="#7FFF00"><b>こんどう泌尿器科・内科クリニック</b></font><br><br>
        <font color="#000000">©</font> 2026 VoiceAuraHealth 
		<span class="tm2"><font color="#000000">(TM)</font></span>
    </div>

	</div>

</div>

<script>

async function checkServer() {
  try {
    const res = await fetch("/api/ping");
    if (res.ok) {
      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("main-app").style.display = "block";
    } else {
      retry();
    }
  } catch (e) {
    retry();
  }
}

let retryCount = 0;

function retry() {
  retryCount++;

  if (retryCount > 20) {
    document.getElementById("loading-screen").innerHTML =
      "<p>⚠ サーバーが起動していません<br>再読み込みしてください</p>";
    return;
  }

  setTimeout(checkServer, 3000);
}

// 起動時
checkServer();


document.addEventListener("DOMContentLoaded", function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(
      "{{ url_for('static', filename='service_worker.js') }}"
    );
  }
});


function renderBar(label, value) {
    const stars = Math.round(value / 20);

    return `
    <div class="bar">
        <div>${label} : ${value}</div>
        <div class="bar-bg">
            <div class="bar-fill" style="width:${value}%"></div>
        </div>
        <div>${"★".repeat(stars)}${"☆".repeat(5 - stars)}</div>
    </div>
    `;
}

function renderResult(data) {
    const box = document.getElementById("resultBox");
    if (!data.result) return;

    const r = data.result;
    const s = r.scores;

    let html = `
    <div class="result-title" style="background:${r.color};">
        あなたは ${r.type} (${r.sector}) です
    </div>
    <div class="card">
    `;

    r.comments.forEach(c=>{
        html += `<div>・${c}</div>`;
    });

    html += `
        ${renderBar("エネルギー", s.Energy)}
        ${renderBar("感情", s.Emotion)}
        ${renderBar("集中", s.Focus)}
        ${renderBar("社交", s.Social)}
        ${renderBar("自律神経", s.Calm)}
    </div>
    `;

    box.innerHTML = html;
}

async function startRecording() {
    const status = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const btn = document.querySelector(".record-btn");

    // 👇 前回結果クリア
    resultBox.innerHTML = "";

    // 👇 ボタンロック
    btn.disabled = true;
    btn.style.opacity = "0.5";

    status.innerText = "録音中...";

    let stream;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    } catch (e) {
        alert("マイク許可が必要です");
		btn.disabled = false;
        btn.style.opacity = "1";
        return;
    }

    const recorder = new MediaRecorder(stream);
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {

        status.innerText = "解析中...";

        const blob = new Blob(chunks,{ type:"audio/webm" });

        const formData = new FormData();
        formData.append("audio", blob);

        try {
            const res = await fetch("/api/upload",{
                method:"POST",
                body:formData
            });

            const data = await res.json();

            renderResult(data);

            status.innerText = "判定完了";
        } catch(e) {
            status.innerText = "エラー発生";
        }

        // 👇 ここ重要（録音停止）
        stream.getTracks().forEach(track=>track.stop());

        // 👇 ボタン復活
        btn.disabled = false;
        btn.style.opacity = "1";

    };

    recorder.start();

    setTimeout(()=>{
        recorder.stop();
    },5000);
}



</script>

</body>
</html>
