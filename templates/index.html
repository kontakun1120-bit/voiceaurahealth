<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='mini_icon.png') }}">
<meta name="theme-color" content="#0f172a">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceAuraHealth (TM)</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    color: #e2e8f0;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
}

.main-hero-logo {
    width: 200px;
    margin-top: 10px;
    margin-bottom: 15px;
    border-radius: 30%;
    box-shadow: 0 0 60px rgba(0,255,255,0.8);
}

h1 {
    margin-top: 15px;
    font-size: 32px;
}

h2 {
    margin-top: 0;
}

.tm {
    font-size: 12px;
    opacity: 0.7;
}

.tm2 {
    font-size: 9px;
    opacity: 0.7;
}

.tm-black {
    color: #000;
    font-size: 12px;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 380px;
    margin: 25px auto 0 auto;
}

.record-btn {
    margin-top: 20px;
    padding: 16px 36px;
    font-size: 18px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(90deg, #00f0ff, #ff00c8);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(0,255,255,0.6);
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.record-btn:hover {
    transform: scale(1.05);
}

.record-btn:disabled {
    cursor: not-allowed;
    box-shadow: none;
    opacity: 0.5;
}

.result-title {
    padding: 20px;
    border-radius: 12px;
    color: white;
    font-size: 22px;
    margin-top: 20px;
}

.result-time {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 5px;
    letter-spacing: 1px;
}

.bar {
    margin: 10px 0 16px 0;
    text-align: left;
    width: 100%;
}

.bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bar-bg {
    background: #334155;
    height: 8px;
    border-radius: 4px;
    margin-top: 6px;
}

.bar-fill {
    background: #22c55e;
    height: 8px;
    border-radius: 4px;
}

.mini-comment {
    font-size: 14px;
    color: #9fdcff;
    margin-top: 8px;
    margin-bottom: 6px;
    opacity: 0.95;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    opacity: 0.6;
}

.star-low {
    color: #ef4444;
}

.star-mid {
    color: #facc15;
}

.star-high {
    color: #22c55e;
}
</style>
</head>

<body>

<div class="container">

    <img src="{{ url_for('static', filename='main_logo.png') }}" class="main-hero-logo">

    <div id="loading-screen">
        <h2>VoiceAuraHealth (TM)</h2>
        <p>🧠 AIエンジン起動中...</p>
        <p>🎙 音声解析準備中...</p>
    </div>

    <div id="main-app" style="display:none;">
        <h1>VoiceAuraHealth <span class="tm-black">(TM)</span></h1>
        <h2>mini（Beta version）</h2>
        <p>あなたの声から人格エネルギーを可視化</p>

        <div class="card">
            <button class="record-btn" onclick="startRecording()">
                🎙 今日のAuraチェック
            </button>
            <span class="tm">( 5秒で測定 )</span>
            <p id="status"></p>
        </div>

        <div id="resultBox"></div>

        <div class="footer">
            <font color="#7FFF00"><b>こんどう泌尿器科・内科クリニック</b></font><br><br>
            <font color="#000000">©</font> 2026 VoiceAuraHealth
            <span class="tm2"><font color="#000000">(TM)</font></span>
        </div>
    </div>
</div>

<script>
async function checkServer() {
    try {
        const res = await fetch("/api/ping");
        if (res.ok) {
            document.getElementById("loading-screen").style.display = "none";
            document.getElementById("main-app").style.display = "block";
        } else {
            retry();
        }
    } catch (e) {
        retry();
    }
}

let retryCount = 0;

function retry() {
    retryCount++;

    if (retryCount > 20) {
        document.getElementById("loading-screen").innerHTML =
            "<p>⚠ サーバーが起動していません<br>再読み込みしてください</p>";
        return;
    }

    setTimeout(checkServer, 3000);
}

checkServer();

document.addEventListener("DOMContentLoaded", function() {
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register(
            "{{ url_for('static', filename='service_worker.js') }}"
        );
    }
});

function renderBar(label, value) {
    const stars = Math.round(value / 20);

    let starClass = "";
    let barColor = "#22c55e";

    if (value <= 30) {
        starClass = "star-low";
        barColor = "#ef4444";
    } else if (value <= 60) {
        starClass = "star-mid";
        barColor = "#facc15";
    } else {
        starClass = "star-high";
        barColor = "#22c55e";
    }

    return `
    <div class="bar">
        <div class="bar-header">
            <span>${label}</span>
            <span>
                <span class="${starClass}">
                    ${"★".repeat(stars)}${"☆".repeat(5 - stars)}
                </span>
                ${value}
            </span>
        </div>
        <div class="bar-bg">
            <div class="bar-fill" style="width:${value}%; background:${barColor};"></div>
        </div>
    </div>
    `;
}

function renderResult(data) {
    const box = document.getElementById("resultBox");

    if (!data.result) return;

    const r = data.result;
    const s = r.scores;

    if (!r.score_comments) return;

    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const timeStr = now.getFullYear() + "年" +
                    (now.getMonth() + 1) + "月" +
                    now.getDate() + "日 " +
                    hh + ":" + mm;

    let html = `
    <div class="result-title" style="background:${r.color};">
        あなたは ${r.type} (${r.sector}) です
    </div>

    <div class="result-time">
        🕒 ${timeStr}
    </div>

    <div class="card">
        ${renderBar("元気", s.Energy)}
        <div class="mini-comment">${r.score_comments.Energy}</div>

        ${renderBar("感情", s.Emotion)}
        <div class="mini-comment">${r.score_comments.Emotion}</div>

        ${renderBar("集中", s.Focus)}
        <div class="mini-comment">${r.score_comments.Focus}</div>

        ${renderBar("社交", s.Social)}
        <div class="mini-comment">${r.score_comments.Social}</div>

        ${renderBar("調律", s.Calm)}
        <div class="mini-comment">${r.score_comments.Calm}</div>
    </div>
    `;

    box.innerHTML = html;
}

async function startRecording() {
    console.log("startRecording開始");

    const status = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const btn = document.querySelector(".record-btn");

    resultBox.innerHTML = "";
    btn.disabled = true;
    btn.style.opacity = "0.5";
    status.innerText = "録音準備中...";

    let stream;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log("マイク取得OK");
    } catch (e) {
        alert("マイク許可が必要です");
        btn.disabled = false;
        btn.style.opacity = "1";
        return;
    }

    status.innerText = "録音中...";

    const recorder = new MediaRecorder(stream);
    let chunks = [];

    recorder.ondataavailable = e => {
        console.log("データ取得");
        chunks.push(e.data);
    };

    recorder.onerror = e => {
        console.error("録音エラー", e);
        status.innerText = "録音エラー";
    };

    recorder.onstop = async () => {
        console.log("録音終了");

        status.innerText = "解析中...";

        const blob = new Blob(chunks, { type: "audio/webm" });
        const formData = new FormData();
        formData.append("audio", blob);

        try {
            const res = await fetch("/api/upload", {
                method: "POST",
                body: formData
            });

			if (!res.ok) {
				const text = await res.text();
				console.error("サーバーエラー:", text);
				status.innerText = "サーバーエラー";
				return;
			}

            const data = await res.json();

            if (data.error) {
                status.innerText = "解析エラー";
                console.error(data.error);
                return;
            }

            renderResult(data);

            if (!data || !data.result) {
                status.innerText = "データ不正";
                console.error("Invalid response:", data);
                return;
            }

            console.log("API結果", data);
            renderResult(data);
            status.innerText = "判定完了";

        } catch (e) {
            console.error(e);
            status.innerText = "通信エラー";
        }

        stream.getTracks().forEach(track => track.stop());
        btn.disabled = false;
        btn.style.opacity = "1";
    };

    recorder.start();

    setTimeout(() => {
        recorder.stop();
    }, 5000);
}
</script>

</body>
</html>
