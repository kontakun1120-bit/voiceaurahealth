<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceAuraHealth (TM)</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    color:#e2e8f0;
    text-align:center;
}

.container {
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.logo {
    width:140px;
    border-radius:50%;
    box-shadow:0 0 40px #00f0ff;
}

h1 {
    margin-top:15px;
    font-size:32px;
}

.tm {
    font-size:14px;
    opacity:0.7;
}

.card {
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    margin-top:25px;
}

.record-btn {
    margin-top:20px;
    padding:16px 36px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background: linear-gradient(90deg,#00f0ff,#ff00c8);
    color:white;
    cursor:pointer;
    box-shadow:0 0 25px rgba(0,255,255,0.6);
    transition:0.3s;
}

.record-btn:hover {
    transform:scale(1.05);
}

.bar {
    margin:10px 0;
    text-align:left;
}

.bar-bg {
    background:#334155;
    height:8px;
    border-radius:4px;
}

.bar-fill {
    background:#22c55e;
    height:8px;
    border-radius:4px;
}

.result-title {
    padding:20px;
    border-radius:12px;
    color:white;
    font-size:22px;
    margin-top:20px;
}

.footer {
    margin-top:40px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

    <img src="/static/main_logo.png" class="logo">

    <h1>VoiceAuraHealth <span class="tm">(TM)</span></h1>
    <p>あなたの声から人格エネルギーを可視化</p>

    <div class="card">
        <button class="record-btn" onclick="startRecording()">
            🎙 5秒録音 → 自動判定
        </button>
        <p id="status"></p>
    </div>

    <div id="resultBox"></div>

    <div class="footer">
        © 2026 VoiceAuraHealth (TM)
    </div>

</div>

<script>

function renderBar(label, value) {
    const stars = Math.round(value / 20);

    return `
    <div class="bar">
        <div>${label} : ${value}</div>
        <div class="bar-bg">
            <div class="bar-fill" style="width:${value}%"></div>
        </div>
        <div>${"★".repeat(stars)}${"☆".repeat(5 - stars)}</div>
    </div>
    `;
}

function renderResult(data) {
    const box = document.getElementById("resultBox");
    if (!data.result) return;

    const r = data.result;
    const s = r.scores;

    let html = `
    <div class="result-title" style="background:${r.color};">
        あなたは ${r.type} (${r.sector}) です
    </div>
    <div class="card">
    `;

    r.comments.forEach(c=>{
        html += `<div>・${c}</div>`;
    });

    html += `
        ${renderBar("Energy", s.Energy)}
        ${renderBar("Emotion", s.Emotion)}
        ${renderBar("Focus", s.Focus)}
        ${renderBar("Social", s.Social)}
        ${renderBar("Calm", s.Calm)}
    </div>
    `;

    box.innerHTML = html;
}

async function startRecording() {
    const status = document.getElementById("status");
    status.innerText = "録音中...";

    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    const recorder = new MediaRecorder(stream);

    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {
        const blob = new Blob(chunks,{ type:"audio/webm" });

        const formData = new FormData();
        formData.append("audio", blob);

        const res = await fetch("/api/upload",{
            method:"POST",
            body:formData
        });

        const data = await res.json();
        renderResult(data);

        status.innerText = "判定完了";
    };

    recorder.start();

    setTimeout(()=>{
        recorder.stop();
        stream.getTracks().forEach(track=>track.stop());
    },5000);
}

</script>

</body>
</html>
