<style>

.container{

/* タイトル */

}

.title{

/* サブタイトル */
.subtitle{

/* =========================
   モード選択
========================= */

    transition: all 0.2s ease;

/* 🔥 ホバー */

}

/* 🔥 押したとき */
#modeSelector button:active{

}

/* 🔥 選択中 */

    background: linear-gradient(135deg,#fb7185,#f43f5e);
    color:white;

}

/* =========================
   🌸 For You（デフォルト）
========================= */
body.mode-balance{

}

========================= */

========================= */

}

body.mode-focus .card{

/* =========================
   メインカード
========================= */

    background:#eeffee;    /* ピンク　#FFCCDD */

    padding:10px;
    margin-top:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* サブカード */

    margin:20px auto 0 auto;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);

    text-align:center;
}

.card2 > *{
    width:100%;
}

.card-main{
    background:#ffffff;   /* ←白🔥 */

.chart-card{
    width:90%;

    width:100% !important;

/* =========================
   🔥 ビジュアルエリア（最重要）
========================= */
#visualBox{
    width:100%;
    max-width:380px;
    aspect-ratio:1/1;   /* 🔥これ重要 */
    margin:0 auto;
    position:relative;
    overflow:hidden;
}

/* 波形 */
#waveCanvas{
    position:absolute;
    top:0;
    width:100%;
    height:100%;
    left:0; right:0;

    opacity:0;                /* ←最初は透明 */
    transition: opacity 0.4s ease;   /* ←これが“ふわっ” */
    
    pointer-events:none;
}

#waveCanvas.active{
    opacity:1;
}

/* リング */
#ringContainer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}

#auraRing{
    width:100%;
    height:100%;
    pointer-events:none; /* 🔥クリック透過 */
}

/* メイン画像 */
#mainImage{
    position:absolute;
	margin: 0 auto;
    top:20%;
    left:0;
    width:70%;
    height:70%;
	left: 0; right: 0;

/* =========================

}

/* =========================
   🔥 ボタン共通改善
========================= */
.btn, 
#ringButtons button {

    transition: all 0.15s ease;

}

/* =========================
   🔥 ホバー（マウス乗せ）
========================= */
.btn:hover,

    transform: translateY(-2px);

}

/* =========================

========================= */
.btn:active,
#ringButtons button:active {

/* =========================

.record-btn{

    border:none;
    border-radius:30px;

    font-size:16px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);

/* =========================
   🔥 呼吸アニメーション
========================= */
.record-btn.idle{
    animation: pulse 2.5s infinite;
}

@keyframes pulse{
    0%   { box-shadow:0 0 0 rgba(253,164,175,0.4); }
    50%  { box-shadow:0 0 20px rgba(253,164,175,0.8); }
    100% { box-shadow:0 0 0 rgba(253,164,175,0.4); }
}

/* =========================
   🔥 押したとき（録音開始）
========================= */
.record-btn.active{
    background: linear-gradient(135deg, #fb7185, #f43f5e);
    transform: scale(0.96);

}

/* =========================

========================= */
#countdownWrap{

    transform:translate(-50%,-50%);

    height:120px;

#countText{

    left:50%;
    transform:translate(-50%,-50%);

#countCircle{

/* コメント */
.comment{

/* =========================

.radio-group{

/* フッター */
.footer{
    margin-top:30px;
    font-size:12px;
    color:#888;
    text-align:center;
}

</style>

<script>

// 🔥 ここに追加（超重要）
let currentLegend = "";

let showRing = false;
let showOuterLabel = true;
let showMiddleLabel = true;
let showInnerLabel = true;
let isDirty = false;

let appSettings = {

    quality: "low",     //  low, mid, high
    resolution: 360,    // 解像度（角度ステップ）low=360, mid=720, high=1440
    lineScale: 2.0,     // ベクトル棒のシャープ化

    boost: 1.5,    // ←ここで強さ調整（1.5〜2.5がおすすめ）
    breath: 1,     // 🔥 呼吸
    effect: 1,	   // 🔥 強さ
    glow: 1	       // 🔥 光のゆらぎ

};

// -------------------- 解像度の変換 --------------------
function getResolution(){

    if(appSettings.quality === "low") return 360;
    if(appSettings.quality === "mid") return 720;
    if(appSettings.quality === "high") return 1440;

    return 360;
}


// -------------------- 録音 カウントダウン関数--------------------
async function countdown(sec=3){

    const wrap = document.getElementById("countdownWrap");
    const text = document.getElementById("countText");
    const circle = document.getElementById("countCircle");

    const total = 314;

    // 🔥 表示ON（ここ重要）
    wrap.style.display = "block";

    // 他は消す
    document.getElementById("mainImage").style.display = "none";
    document.getElementById("waveCanvas").style.display = "none";
    document.getElementById("ringContainer").style.display = "none";

    for(let i=sec;i>0;i--){

        text.innerText = i;

        // 初期化
        circle.style.transition = "none";
        circle.style.strokeDashoffset = "0";

        // 🔥 強制再描画（これが重要）
        circle.getBoundingClientRect();

        // アニメ開始
        circle.style.transition = "stroke-dashoffset 1s linear";
        circle.style.strokeDashoffset = total;

        await new Promise(r=>setTimeout(r,1000));
    }

    text.innerText = "🎤";

    await new Promise(r=>setTimeout(r,400));

    // 🔥 カウントダウン消す
    wrap.style.display = "none";
}

// -------------------- 録音 --------------------
async function startRecording(sec){

	baselineDB = null;  // ←これ追加

    // 🔥 カウントダウン
    await countdown(3);

    let stream;

    try{
        stream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(e){
        alert("マイク許可が必要です");
        return;
    }

    const status = document.getElementById("status");
    const result = document.getElementById("result");

    status.innerText = "録音準備中...";
    result.innerHTML = "";

    // =========================
    // 🔥 ① 波形スタート（ここだけ追加）
    // =========================
    const audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    source.connect(analyser);

    analyser.fftSize = 256;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);



	const wave = document.getElementById("waveCanvas");

	wave.style.display = "block";   // 表示
	setTimeout(()=>{
		wave.classList.add("active");   // ←ふわっと出る
	},10);

//    document.getElementById("waveCanvas").style.display = "block";
	
    document.getElementById("mainImage").style.display = "none";
    document.getElementById("ringContainer").style.display = "none";

    isRecording = true;
	
	const canvas = document.getElementById("waveCanvas");

	canvas.width  = canvas.offsetWidth;
	canvas.height = canvas.offsetHeight;
	
    drawWave(analyser, dataArray);
    // =========================

    status.innerText = "録音中...";

    let options = { mimeType: "audio/webm" };

	if (MediaRecorder.isTypeSupported("audio/mp4")) {
		options.mimeType = "audio/mp4";
	} else if (MediaRecorder.isTypeSupported("audio/webm")) {
		options.mimeType = "audio/webm";
	}

	const recorder = new MediaRecorder(stream, options);
	
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async ()=>{

        // =========================
        // 🔥 ② 波形ストップ
        // =========================
        isRecording = false;
        cancelAnimationFrame(waveAnimationId);
		
//        document.getElementById("waveCanvas").style.display = "none";
		
		wave.classList.remove("active");

		setTimeout(()=>{
			wave.style.display = "none";
		},400);
		
		
        // =========================

        status.innerText = "解析中...";

		const blob = new Blob(chunks, { type: recorder.mimeType });
		const formData = new FormData();

		const ext = recorder.mimeType.includes("mp4") ? "mp4" : "webm";
		formData.append("audio", blob, `record.${ext}`);
		formData.append("db", Number(currentDB));
		
		let data;
		
		try {
			const res = await fetch("/api/upload",{method:"POST", body:formData});

			if(!res.ok){
				status.innerText = "通信エラー";
				return;
			}

			data = await res.json();

		} catch(e){
			status.innerText = "接続エラー";
			return;
		}

        if(!data.result){
            status.innerText = "エラー";
            return;
        }

        await render(data);

        status.innerText = "完了";

        stream.getTracks().forEach(t=>t.stop());
    };

    recorder.start();
    setTimeout(()=>recorder.stop(),5000);
}

// -------------------- 表示 --------------------
let lastResult = null;

async function render(data){

    lastResult = data.result;

//    lastResult = data;  // 保存

	const r = adjustScores(
		JSON.parse(JSON.stringify(data.result)),
		currentMode
	);
    const s = r.scores;

    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, "0");
    const dd = String(now.getDate()).padStart(2, "0");
    const hh = String(now.getHours()).padStart(2, "0");
    const mi = String(now.getMinutes()).padStart(2, "0");
    const time = `${yyyy}年${mm}月${dd}日 ${hh}:${mi}`;

    const diffText = await loadDiff();

    let html = `
    <div class="card card-main">
        <b>あなたの今の状態 🌿（%）</b>
        <div class="time">${time}</div>
        <div class="comment">${diffText}</div>
		<div class="comment" style="color:${getStressColor(s.MentalStress)}">
			心理ストレス：${s.MentalStress}
		</div>

		<div class="comment">総合ストレス：${s.Stress}</div>
		<div class="comment">隠れストレスか：${s.HiddenStress ?? 0}</div>
        <div class="comment">元気：${s.Energy}</div>
        <div class="comment">気持ち：${s.Emotion}</div>
        <div class="comment">集中：${s.Focus}</div>
    </div>

	<div class="comment">環境騒音：${r.Noise ?? Math.round(currentDB)} dB</div>
	<div class="comment">${r.EnvironmentFlag || ""}</div>

    <div class="card card-main">
        💭 今のあなたへ
        <div class="comment">${formatCommentByMode(r.summary)}</div>

        <input id="user_comment" maxlength="20"
        placeholder="ひとことメモ（任意）"
        style="margin-top:10px;width:90%;padding:10px;border-radius:10px;border:none;background:#f3f4f6;">

        <button class="btn" onclick="saveComment()" style="margin-top:10px;">
            💾 保存
        </button>
    </div>

    <div id="detail"></div>
    `;

    document.getElementById("result").innerHTML = html;
	
	// 👇これを追加
	window.lastScores = r.scores;
	window.ringMeta = r.ring_meta;

	// 🔥 ここ追加（超重要）
	window.lastVector = r.vector192;
	
	drawAllAura(r.vector192);
	
	// 🔥 リング表示
	document.getElementById("ringContainer").style.display = "block";
	document.getElementById("mainImage").style.display = "none";
	
	llmData = null;	   // 👇コメントのキャッシュ　リセット
}

// -------------隠れストレス　判定関数 --------------------
function getHiddenLabel(v){
    if(v > 20) return "⚠️ 内面ストレス高（隠れ）";
    if(v < -20) return "🌀 一時的変動";
    return "🌿 安定";
}


// -------------------- 保存処理 --------------------
async function saveComment(){

    const comment = document.getElementById("user_comment").value;

    if(!lastResult){
        alert("先に測定してください");
        return;
    }

    if(comment.trim() === ""){
        if(!confirm("コメント無しで保存しますか？")){
            return;
        }
    }

    await fetch("/api/save_comment",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            scores:lastResult.scores,
            vector192:lastResult.vector192,
            summary:lastResult.summary,
            comment:comment
        })
    });

    alert("保存しました✨");
    loadChart();
}


// -------------------- 履歴--------------------
async function loadHistory(){

    const box = document.getElementById("history");

    if(box.style.display === "block"){
        box.style.display = "none";
        return;
    }

    box.style.display = "block";

	let html = `
	<div style="margin-bottom:10px;">
		<button onclick="deleteAll()" 
			style="background:#fecaca;border:none;border-radius:10px;padding:6px 10px;">
			🗑 全削除
		</button>
	</div>

	<div><b>📖 履歴</b></div>
	`;

    // 既存処理

    const res = await fetch("/api/sessions");
    const json = await res.json();

    json.data.forEach(d => {

        let emoji = "🌿";
        if(d.energy > 60) emoji = "😊";
        if(d.energy < 30) emoji = "😴";

        html += `
		<div style="display:flex;justify-content:space-between;align-items:center;
					padding:8px;border-bottom:1px solid #eee;">

			<div onclick="loadDetail('${d.id}')" style="cursor:pointer;">
				${emoji} ${d.time}
			</div>

			<button onclick="deleteOne('${d.id}')" 
				style="background:#fee2e2;border:none;border-radius:10px;padding:4px 8px;">
				✕
			</button>

		</div>
		
        `;
    });

    document.getElementById("history").innerHTML = html;
}

// -------------------- 履歴　1行削除　------------------
async function deleteOne(id){

    if(!confirm("この履歴を削除しますか？")) return;

    await fetch("/api/delete_session/" + id, {
        method:"DELETE"
    });

    loadHistory(); // 🔥 再読み込み
}


// -------------------- 履歴　全削除　------------------
async function deleteAll(){

    if(!confirm("すべて削除しますか？")) return;

    await fetch("/api/delete_all_sessions", {
        method:"DELETE"
    });

    document.getElementById("history").innerHTML = "";
}


// -------------------- 差分　表示--------------------
async function loadDiff(){

    const res = await fetch("/api/diff");
    const json = await res.json();

    const d = json.diff;

    let text = "変化なし";
    let emoji = "🌿";

    if(d > 0){
        text = `昨日より +${d}`;
        emoji = "😊";

        emoji = "😴";

}

// -------------------- グラフ 1 --------------------
function metric(name, v, d=0){

    const stars = Math.round(v/20);

    let color = "#86efac";
    if(v <= 30) color = "#fda4af";
    else if(v <= 60) color = "#fde68a";

    let diffText = "";
    if(d > 0) diffText = ` (+${d} 😊)`;
    else if(d < 0) diffText = ` (${d} 😴)`;

    return `
    <div style="margin-top:10px;text-align:left;">
        <b>${name}</b><br>

        <span style="color:${color};font-size:16px;">
            ${"★".repeat(stars)}${"☆".repeat(5-stars)}
        </span>

        <span style="font-size:12px;color:#888;margin-left:5px;">
            ${v}${diffText}
        </span>

        <div style="height:6px;background:#eee;border-radius:10px;margin-top:5px;">
            <div style="width:${v}%;background:${color};height:6px;border-radius:10px;"></div>
        </div>
    </div>
    `;
}


// -------------------- グラフ 2--------------------
let chart = null;

async function loadChart(){

    const canvas = document.getElementById("energyChart");

    // 🔥 ここ追加（トグル）
    if(canvas.style.display === "block"){
        canvas.style.display = "none";
        return;
    }

    canvas.style.display = "block";

    // 🔥 これ追加
    canvas.width = canvas.offsetWidth;
    canvas.height = 200;

    const res = await fetch("/api/energy_trend");
    const json = await res.json();

	const labels = json.data.map(d => {
		const t = new Date(d.time);

		const month = t.getMonth() + 1;
		const day   = t.getDate();
		const week = ["日","月","火","水","木","金","土"];
		const w = week[t.getDay()];
		const hour = String(t.getHours()).padStart(2,"0");
		const min   = String(t.getMinutes()).padStart(2,"0");

		return `${month}/${day}(${w}) ${d.zone} ${hour}:${min}`;
	});

    const values = json.data.map(d=>d.energy);

    const ctx = canvas;

    if(chart){
        chart.destroy();
    }

    chart = new Chart(ctx,{
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                data:values,
                tension:0.0
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    });
}

    currentTab = type;

    if(!llmData){
        document.getElementById("llmCommentBox").innerText = "データなし";
        return;
    }

    let text = "データなし";

    if(type === "summary"){
        text = llmData.summary ?? "データなし";
    }else{
        const jpMap = {
            "energy": "元気",
            "emotion": "気持ち",
            "focus": "集中",
            "stress": "声",
            "mental": "心理"
        };

        const jp = jpMap[type];
        text = getModeComment(jp);
    }

    // =====================================
    // 🔥 ここ追加（for stress 限定）
    // =====================================
    if(currentMode === "stress" && type === "stress"){

        const hidden = llmData.hidden ?? 0;
        const label = getHiddenLabel(hidden);

        text += `<br><br><b>隠れストレス：</b>${hidden.toFixed(1)} (${label})`;
    }

    // 以下　普通のコード
    document.getElementById("llmCommentBox").innerHTML = text ?? "データなし";

    document.querySelectorAll(".llm-tab").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
}


// -------------------- リング 中核関数 no1--------------------
function interpolate360(values){

    const result = [];
    const n = values.length;

	const resolution = getResolution(); 

    for(let i=0;i<resolution;i++){

        const t = i / resolution * n;

        const i0 = Math.floor(t);
        const i1 = (i0 + 1) % n;

        const frac = t - i0;

        const v = values[i0]*(1-frac) + values[i1]*frac;

        result.push(v);
    }

    return result;
}


// -------------------- リング 中核関数 no2--------------------
function smoothArray(values){

    const result = [];
    const len = values.length;

    for(let i=0;i<len;i++){

		const noise = (Math.random() - 0.5) * 0.02;
		const v = values[i] + noise;

        const v0 = values[(i-2+len)%len];
        const v1 = values[(i-1+len)%len];
        const v2 = values[i];
        const v3 = values[(i+1)%len];
        const v4 = values[(i+2)%len];

        // 🔥 重み付き（ここが違う）
        const smooth = (v0 + 2*v1 + 3*v2 + 2*v3 + v4) / 9;

        result.push(smooth);
    }

    return result;
}


// -------------------- リング 中核関数 no3--------------------
function buildAura(vector){

    // ========= 外リング =========
    const dna = smoothArray(interpolate360(vector));

    // ========= 中リング（12心理🔥） =========
    const psy = [];

    const groupSize = Math.floor(vector.length / 12);

    for(let i=0;i<12;i++){

        const start = i * groupSize;
        const end   = start + groupSize;

        const slice = vector.slice(start, end);

        const avg = slice.reduce((a,b)=>a+b,0) / slice.length;

        psy.push(avg);
    }

    // 🔥 12 → 360へ拡張
    const psy360 = smoothArray(interpolate360(psy));

    // ========= 内リング =========
    const aura = smoothArray(interpolate360(psy));

    return {
        dna: dna,
        psy: psy360,
        aura: aura
    };
}

// -------------------- 外リング　描画関数--------------------
function drawAllAura(vector){

    if(!vector || vector.length === 0) return;

    const canvas = document.getElementById("auraRing");
    const ctx = canvas.getContext("2d");

    const size = canvas.offsetWidth;

    canvas.width  = size;
    canvas.height = size;

    const cx = size / 2;
    const cy = size / 2;

    ctx.clearRect(0,0,size,size);

    // 🔥 データはここで1回だけ
    const { dna, psy, aura } = buildAura(vector);

    // 外
    {
        const innerBase = size * 0.38;    // 元々 0.28
        const outerMax  = size * 0.48;    // 元々 0.46

        drawOuterAura(ctx, cx, cy, dna, innerBase, outerMax);
    }

    // 中
    {
        const innerBase = size * 0.25;    // 元々 0.22
        const outerMax  = size * 0.34;    // 元々 0.34

        drawMiddleAura(ctx, cx, cy, psy, innerBase, outerMax);
    }

    // 内
    {
        const innerBase = size * 0.12;    // 元々 0.12
        const outerMax  = size * 0.20;    // 元々 0.20

        drawInnerAura(ctx, cx, cy, aura, innerBase, outerMax);
    }

    // 凡例ラベル
    if(showOuterLabel) drawLegend(ctx, cx, cy, size * 0.45);          // 外リングラベル
    if(showMiddleLabel) drawMiddleLegend(ctx, cx, cy, size * 0.33);   // 中リングラベル
    if(showInnerLabel) drawInnerLegend(ctx, cx, cy, size * 0.20);     // 内リングラベル

}


// =========================
// 🔥 外リング（192ベクトル）
// =========================
function drawOuterAura(ctx, cx, cy, normData, innerBase, outerMax){

    // =========================
    // 正規化
    // =========================
    const min = Math.min(...normData);
    const max = Math.max(...normData);

    const norm = normData.map(v=>{
        if(max - min === 0) return 0.5;
        return (v - min) / (max - min);
    });

    const scale = appSettings.lineScale || 1.5;

    // =========================
    // 描画
    // =========================
    for(let i=0;i<norm.length;i++){

        const angle = (i / norm.length) * Math.PI * 2 - Math.PI/2;

        const boost  = appSettings.boost;
        const breath = appSettings.breath * 0.05 * Math.sin(Date.now()/400);
        const effect = appSettings.effect;
        const glow   = appSettings.glow * Math.abs(Math.sin(Date.now()/500));

        const intensity = norm[i];

        // 半径（外方向だけ）
        const r = innerBase 
            + Math.pow(intensity, boost) * (outerMax - innerBase)
            + breath * 10;

        // =========================
        // 🔥 内側ズレ防止（最重要）
        // =========================
        const safeInner = innerBase + 1.5;

        const x1 = cx + safeInner * Math.cos(angle);
        const y1 = cy + safeInner * Math.sin(angle);

        const x2 = cx + r * Math.cos(angle);
        const y2 = cy + r * Math.sin(angle);

        // =========================
        // 🌈 虹色
        // =========================
        const hue = (i / norm.length) * 360;
        const color = `hsl(${hue}, 90%, 60%)`;

        // =========================
        // 線
        // =========================
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.min(2, 0.6 + intensity * 1.0 * effect);

        // =========================
        // 🔥 外側オーラのみ
        // =========================
        ctx.shadowBlur = (2 + intensity * 6 + glow * 3) * scale;
        ctx.shadowColor = color;

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.stroke();
    }

    // =========================
    // 外リング基準円（極細）
    // =========================
    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.arc(cx, cy, innerBase, 0, Math.PI*2);
    ctx.strokeStyle = "#eeeeee";
    ctx.lineWidth = 1;
    ctx.stroke();
}


// -------------------- リング 凡例（外周ラベル）描画--------------------
// 🌈 凡例（外周ラベル）
function drawLegend(ctx, cx, cy, radius){

    const labels = [
        "創造","思考","冷静","対人","共感","自信",
        "存在","満足","身体","行動","情熱","直感"
    ];

    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for(let i=0;i<labels.length;i++){

        const angle = (i / labels.length) * Math.PI * 2 - Math.PI/2;

        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);

        const hue = (i / labels.length) * 360;
		
		ctx.lineWidth = 3;
		ctx.strokeStyle = "#000";   // 黒縁

		ctx.strokeText(labels[i], x, y);  // 先に縁
		ctx.fillStyle = `hsl(${hue}, 90%, 90%)`;

        ctx.fillText(labels[i], x, y);
    }
}

// =========================
// 🔥 中リング（心理リング）
// =========================
function drawMiddleAura(ctx, cx, cy, normData, innerBase, outerMax){

    const min = Math.min(...normData);
    const max = Math.max(...normData);

    const norm = normData.map(v=>{
        if(max - min === 0) return 0.5;
        return (v - min) / (max - min);
    });

    const scale = appSettings.lineScale || 1.5;

    // 🎯 12心理カラー
    const psyColors = [
        "#8F00FF","#001F54","#0077FF","#00B7C2",
        "#7FFF00","#FFD300","#FFD700","#FF8C00",
        "#FF6F61","#FF0000","#FF00FF","#00A86B"
    ];

    const sectorSize = Math.floor(norm.length / 12);

    for(let i=0;i<norm.length;i++){

        const angle = (i / norm.length) * Math.PI * 2 - Math.PI/2;

        const boost  = appSettings.boost * 0.9;
        const breath = appSettings.breath * 0.04 * Math.sin(Date.now()/400);
        const effect = appSettings.effect;
        const glow   = appSettings.glow * Math.abs(Math.sin(Date.now()/500));

        const intensity = norm[i];

        const r = innerBase 
            + Math.pow(intensity, boost) * (outerMax - innerBase)
            + breath * 8;

        // 🔥 内側ににじまない
        const safeInner = innerBase + 1.2;

        const x1 = cx + safeInner * Math.cos(angle);
        const y1 = cy + safeInner * Math.sin(angle);

        const x2 = cx + r * Math.cos(angle);
        const y2 = cy + r * Math.sin(angle);

        const sectorIndex = Math.floor(i / sectorSize) % 12;
        const color = psyColors[sectorIndex];

        ctx.strokeStyle = color;
        ctx.lineWidth = Math.min(2, 0.6 + intensity * 0.8 * effect);

        ctx.shadowBlur = (2 + intensity * 5 + glow * 2) * scale;
        ctx.shadowColor = color;

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.stroke();
    }

    // 基準円
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(cx, cy, innerBase, 0, Math.PI*2);
    ctx.strokeStyle = "#e5e7eb";
    ctx.lineWidth = 1;
    ctx.stroke();
}


// -------------------- リング 凡例（中周ラベル）描画 --------------------
// 🌈 凡例（中周ラベル）
function drawMiddleLegend(ctx, cx, cy, radius){

    const labels = [
        "直感","分析","冷静","対人",
        "共感","自信","存在感","満足",
        "身体","行動","情熱","想像"
    ];

    const colors = [
        "#8F00FF", "#001F54", "#0077FF", "#00B7C2",
        "#7FFF00", "#FFD300", "#FFD700", "#FF8C00",
        "#FF6F61", "#FF0000", "#FF00FF", "#00A86B"
    ];

    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for(let i=0;i<labels.length;i++){

        const angle = (i / labels.length) * Math.PI * 2 - Math.PI/2;

        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);

        // 🔥 縁（しっかり）
		ctx.lineWidth = 1.2;
		ctx.strokeStyle = "rgba(0,0,0,0.45)";
		ctx.strokeText(labels[i], x, y);

        // 🔥 色を薄く（方法②）
        ctx.fillStyle = hexToRgba(colors[i], 0.35);
        ctx.fillText(labels[i], x, y);
    }
}


// -------------- リング 凡例（中周ラベル）描画 HEX対応版------------------
function hexToRgba(hex, alpha){

    const r = parseInt(hex.substring(1,3),16);
    const g = parseInt(hex.substring(3,5),16);
    const b = parseInt(hex.substring(5,7),16);

    return `rgba(${r},${g},${b},${alpha})`;
}

// =========================
function drawInnerAura(ctx, cx, cy, normData, innerBase, outerMax){

    const min = Math.min(...normData);
    const max = Math.max(...normData);

    const norm = normData.map(v=>{
        if(max - min === 0) return 0.5;
        return (v - min) / (max - min);
    });

    const scale = appSettings.lineScale || 1.5;

    // 🔥 滑らか補間（重要）
    const smooth = (arr, i)=>{
        const prev = arr[(i-1+arr.length)%arr.length];
        const curr = arr[i];
        const next = arr[(i+1)%arr.length];
        return (prev + curr + next) / 3;
    };

    for(let i=0;i<norm.length;i++){

        const angle = (i / norm.length) * Math.PI * 2 - Math.PI/2;

        const boost  = appSettings.boost * 0.7;
        const breath = appSettings.breath * 0.03 * Math.sin(Date.now()/400);
        const effect = appSettings.effect;
        const glow   = appSettings.glow * Math.abs(Math.sin(Date.now()/500));

        const intensity = smooth(norm, i);

        const r = innerBase
            + Math.pow(intensity, boost) * (outerMax - innerBase)
            + breath * 6;

        // 🔥 内側ににじまない
        const safeInner = innerBase + 1;

        const x1 = cx + safeInner * Math.cos(angle);
        const y1 = cy + safeInner * Math.sin(angle);

        const x2 = cx + r * Math.cos(angle);
        const y2 = cy + r * Math.sin(angle);

        // 🌈 なめらか虹
        const hue = (i / norm.length) * 360;
        const color = `hsl(${hue}, 70%, ${60 + intensity * 10}%)`;

        ctx.strokeStyle = color;
        ctx.lineWidth = Math.min(1.8, 0.5 + intensity * 0.7 * effect);

        ctx.shadowBlur = (1.5 + intensity * 4 + glow * 2) * scale;
        ctx.shadowColor = color;

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.stroke();
    }

    // 内円
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(cx, cy, innerBase, 0, Math.PI*2);
    ctx.strokeStyle = "#f1f5f9";
    ctx.lineWidth = 1;
    ctx.stroke();
}

// 🌈 凡例（内周ラベル）
function drawInnerLegend(ctx, cx, cy, radius){

    // =========================
    // 🔥 12心理ラベル
    // =========================
    const labels = [
        "直感","分析","冷静","対人",
        "共感","自信","存在感","満足",
        "身体","行動","情熱","想像"
    ];

    // =========================
    // 🔥 カラー（内リングと統一）
    // =========================
    const colors = [
        "#8F00FF", "#001F54", "#0077FF", "#00B7C2",
        "#7FFF00", "#FFD300", "#FFD700", "#FF8C00",
        "#FF6F61", "#FF0000", "#FF00FF", "#00A86B"
    ];

    ctx.font = "10px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // =========================
    // 🔥 描画
    // =========================
    for(let i=0;i<labels.length;i++){

        const angle = (i / labels.length) * Math.PI * 2 - Math.PI/2;

        // 🔥 少し内側に配置
        const r = radius - 10;

        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);

        // =========================
        // 🔥 縁取り（白で見やすく）
        // =========================
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#fff";
        ctx.strokeText(labels[i], x, y);

        // =========================
        // 🔥 本体
        // =========================
        ctx.fillStyle = colors[i];
        ctx.fillText(labels[i], x, y);
    }
}

// =========================
// 🔥 12セクター計算（外に出す）
// =========================
function compute12Sector(data){

    const sectors = [];

    const size = Math.max(1, Math.floor(data.length / 12));

    for(let i=0;i<12;i++){

        let sum = 0;
        let count = 0;

        for(let j=0;j<size;j++){
            const idx = i*size + j;
            if(idx < data.length){
                sum += data[idx];
                count++;
            }
        }

        sectors.push(count > 0 ? sum / count : 0);
    }

    return sectors;
}

// =========================
// 🔥 波形描画（コア🔥）
// ========================
let isRecording = false;
let waveAnimationId = null;

function drawWave(analyser, dataArray){
	measureDB(analyser, dataArray);

    const canvas = document.getElementById("waveCanvas");
    const ctx = canvas.getContext("2d");

    const width = canvas.width;
    const height = canvas.height;

    analyser.getByteTimeDomainData(dataArray);

    ctx.clearRect(0,0,width,height);

    const centerY = height / 2;

    ctx.beginPath();

    for(let i=0;i<dataArray.length;i++){

        const x = (i / dataArray.length) * width;

        const v = dataArray[i] / 255.0;
        const y = centerY + (v - 0.5) * 120;

        if(i === 0){
            ctx.moveTo(x,y);
        }else{
            // 🌸 なめらか曲線
            const prevX = ((i-1) / dataArray.length) * width;
            const prevY = centerY + ((dataArray[i-1]/255.0)-0.5)*120;

            const cx = (prevX + x) / 2;

            ctx.quadraticCurveTo(prevX, prevY, cx, (prevY + y)/2);
        }
    }
	

    // =========================
    // 🌈 グラデーション（可愛い）
    // =========================
    const grad = ctx.createLinearGradient(0,0,width,0);
    grad.addColorStop(0,"#ff9ecb");
    grad.addColorStop(0.5,"#fda4af");
    grad.addColorStop(1,"#ff7eb3");

    ctx.strokeStyle = grad;

    // =========================
    // ✨ ぼかし
    // =========================
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#ff9ecb";

    // =========================
    // 💗 太さ
    // =========================
    ctx.lineWidth = 6;

    ctx.stroke();

    // =========================
    // 🌸 内側の細い線（2重）
    // =========================
    ctx.shadowBlur = 0;
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#ffffffaa";

    ctx.stroke();

    // =========================
    // 🔥 アニメーション
    // =========================
    if(isRecording){
        waveAnimationId = requestAnimationFrame(()=>{
            drawWave(analyser, dataArray);
        });
    }
}

// =========================
// 🔥 dB測定（改善版）
// =========================
let currentDB = 0;
let smoothedDB = 0;
let baselineDB = null;

function measureDB(analyser, dataArray){

    analyser.getByteTimeDomainData(dataArray);

    let sum = 0;

    for(let i=0;i<dataArray.length;i++){
        const v = (dataArray[i] - 128) / 128.0;
        sum += v * v;
    }

    const rms = Math.sqrt(sum / dataArray.length);

    // 🔥 生dB（物理寄り）
    let dbRaw = 20 * Math.log10(rms + 1e-6);

    // 🔥 スケーリング（現実寄り）
    let db = (dbRaw + 60) * 1.5;

    // 🔥 baseline補正（初回のみ記録）
    if(baselineDB === null){
        baselineDB = db;
    }

    let adjusted = db - baselineDB + 40; // 中央を40付近に

    // 🔥 スムージング（重要）
    smoothedDB = smoothedDB * 0.8 + adjusted * 0.2;

    currentDB = Math.max(0, Math.min(100, Math.round(smoothedDB)));
}

function adjustScores(r, mode){

    if(!r || !r.scores) return r;

    if(mode === "stress"){
        r.scores.Stress = Math.min(100, r.scores.Stress * 1.3);
        r.scores.Energy *= 0.9;
    }

    if(mode === "focus"){
        r.scores.Focus = Math.min(100, r.scores.Focus * 1.3);
    }

    return r;
}
