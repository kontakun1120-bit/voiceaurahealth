<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Room | VoiceAura City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/components.css">
<link rel="stylesheet" href="/static/css/room.css">
</head>

<body>

<div id="blur_bg" class="blur-bg"></div>

<div class="top-bar">
  <a href="/" class="back-city">← Cityへ戻る</a>
</div>


<div class="room-container">

  <!-- プロフィール入力 -->
  <div id="profile_modal" class="modal hidden">
    <div class="modal-box">
      <h2>ようこそ</h2>
      <p>簡単なプロフィール（任意）</p>

      <input id="nickname" placeholder="ニックネーム（匿名OK）">
      <input id="age" placeholder="年齢（例：30代）">
      
      <select id="gender">
        <option value="">性別（任意）</option>
        <option>男性</option>
        <option>女性</option>
        <option>不明</option>
      </select>

      <button onclick="startRoom()">はじめる</button>
      <button class="skip" onclick="startRoom(true)">スキップ</button>
			<button class="reset-btn" 
				onmousedown="startResetPress(event)" 
				onmouseup="cancelResetPress(event)" 
				ontouchstart="startResetPress(event)" 
				ontouchend="cancelResetPress(event)">
				長押しでリセット
			</button>
    </div>
  </div>

  <!-- 設定モーダル -->
	<div id="settings_modal" class="modal hidden">
		<div class="modal-box">
			<h2>設定</h2>

			<!-- 背景 -->
			<p>背景</p>
			<label><input type="radio" name="bg" value="bg1"> 夜空</label><br>
			<label><input type="radio" name="bg" value="bg2"> 海</label><br>
			<label><input type="radio" name="bg" value="bg3"> 森</label><br>
			<label><input type="radio" name="bg" value="bg4"> 都市</label><br>
			<label><input type="radio" name="bg" value="bg5"> 無地</label><br>

			<!-- 音楽 -->
			<p>音楽</p>
			<label><input type="radio" name="music" value="on"> ON</label>
			<label><input type="radio" name="music" value="off"> OFF</label>

			<!-- 履歴 -->
			<p>履歴表示</p>
			<label><input type="radio" name="history" value="0"> 無し</label><br>
			<label><input type="radio" name="history" value="20"> 20件</label><br>
			<label><input type="radio" name="history" value="100"> 100件</label><br>
			<label><input type="radio" name="history" value="500"> 500件+</label><br>

			<button onclick="saveSettings()">保存</button>
			<button onclick="closeSettings()" class="skip">閉じる</button>

		</div>
	</div>


  <!-- メイン -->
  <div id="room_main" class="room-main hidden">

    <h2>
			<div class="welcome-row">
				<div id="welcome"></div>
				<button class="edit-btn" onclick="openProfile()">✏️</button>
			</div>
		</h2>

    <div id="notice_board" class="notice">
      <p>📢 お知らせ：VoiceAura City β公開中</p>
    </div>

    <div id="weather_box"></div>

    <div id="content_area"></div>

    <div class="room-links">
      <button onclick="goHealth()">🏥 Health</button>
      <button onclick="goLab()">🎓 Lab</button>
      <button onclick="goTeam()">🏢 Team</button>
			<button onclick="openSettings()">⚙ 設定</button>
    </div>

  </div>

</div>

<script src="/static/js/room.js"></script>

</body>
</html>
