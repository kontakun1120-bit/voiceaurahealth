<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Room | VoiceAura City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/components.css">
<link rel="stylesheet" href="/static/css/room.css">
</head>

<body>

<div id="blur_bg" class="blur-bg"></div>

<div class="top-bar">
  <a href="/" class="back-city">← Cityへ戻る</a>
</div>


<div class="room-container">

  <!-- プロフィール入力 -->
  <div id="profile_modal" class="modal hidden">
    <div class="modal-box">
      <h2>ようこそ</h2>
      <p>簡単なプロフィール（任意）</p>

      <input id="nickname" placeholder="ニックネーム（匿名OK）">
      <input id="age" placeholder="年齢（例：30代）">
      
      <select id="gender">
        <option value="">性別（任意）</option>
        <option>男性</option>
        <option>女性</option>
        <option>不明</option>
      </select>

      <button onclick="startRoom()">はじめる</button>
      <button class="skip" onclick="startRoom(true)">スキップ</button>
			<button class="reset-btn" 
				onmousedown="startResetPress(event)" 
				onmouseup="cancelResetPress(event)" 
				ontouchstart="startResetPress(event)" 
				ontouchend="cancelResetPress(event)">
				長押しでリセット
			</button>
    </div>
  </div>

  <!-- 設定モーダル -->
	<div id="settings_modal" class="modal hidden">
		<div class="modal-box">

			<!-- 固定エリア -->
			<div class="modal-header">
				<h3>設定</h3>
			</div>

			<!-- タブ（固定） -->
			<div class="setting-tabs">
				<!-- 1段目 -->
				<div class="tab-row">
					<button class="tab active" onclick="switchTab('bg', event)">🎨背景</button>
					<button class="tab" onclick="switchTab('music', event)">🎵音楽</button>
					<button class="tab" onclick="switchTab('time', event)">🕒時刻</button>
					<button class="tab" onclick="switchTab('history', event)">📊履歴</button>
				</div>
				<!-- 2段目 -->
				<div class="tab-row">
					<button class="tab" onclick="switchTab('no1', event)">アバター</button>
					<button class="tab" onclick="switchTab('no2', event)">ペット</button>
					<button class="tab" disabled>Coming</button>
					<button class="tab" disabled>Coming</button>
				</div>
			</div>

			<!-- スクロールエリア -->
			<div class="modal-body">
				<div class="tab-content" id="tab-bg">
					<label class="bg-option">
						<input type="radio" name="bg" value="bg1" checked>
						<div class="bg-card bg1">
							🌌 夜空
						</div>
					</label>						
					<label class="bg-option">
						<input type="radio" name="bg" value="bg2">
						<div class="bg-card bg2">
							🌊 海
						</div>
					</label>
					<label class="bg-option">
						<input type="radio" name="bg" value="bg3">
						<div class="bg-card bg3">
							🌲 森
						</div>
					</label>						
					<label class="bg-option">
						<input type="radio" name="bg" value="bg4">
						<div class="bg-card bg4">
							🏙 都市
						</div>
					</label>						
					<label class="bg-option">
						<input type="radio" name="bg" value="bg5">
						<div class="bg-card bg5">
							⬛ シンプル
						</div>
					</label>						
				</div>

				<div class="tab-content hidden" id="tab-music">
					<label class="bg-option">
						<input type="radio" name="music" value="on">
						<div class="bg-card">
							🔊 ON
						</div>
					</label>
					<label class="bg-option">
						<input type="radio" name="music" value="off" checked>
						<div class="bg-card">
							🔇 OFF
						</div>
					</label>
				</div>

				<div class="tab-content hidden" id="tab-time">
				<label class="bg-option">
					<input type="radio" name="time" value="auto" checked>
					<div class="bg-card">🕒 自動</div>
				</label>
				<label class="bg-option">
					<input type="radio" name="time" value="morning">
					<div class="bg-card">🌅 朝</div>
				</label>
				<label class="bg-option">
					<input type="radio" name="time" value="day">
					<div class="bg-card">🌤 昼</div>
				</label>
				<label class="bg-option">
					<input type="radio" name="time" value="night">
					<div class="bg-card">🌙 夜</div>
				</label>
				</div>

				<div class="tab-content hidden" id="tab-history">
				<label class="bg-option">
					<input type="radio" name="history" value="0">
					<div class="bg-card">🚫 無し</div>
				</label>
				<label class="bg-option">
					<input type="radio" name="history" value="20" checked>
					<div class="bg-card">📘 20件</div>
				</label>
				<label class="bg-option">
					<input type="radio" name="history" value="100">
					<div class="bg-card">📗 100件</div>
				</label>
				<label class="bg-option">
					<input type="radio" name="history" value="500">
					<div class="bg-card">📕 500+</div>
				</label>
				</div>
			</div>

			<!-- フッター -->
			<div class="modal-footer">
				<button onclick="saveSettings()">保存</button>
				<button onclick="closeSettings()" class="skip">閉じる</button>
			</div>

		</div>
	</div>


  <!-- メイン -->
  <div id="room_main" class="room-main hidden">
		<!-- コンテンツ -->
		<div class="room-header">
			<div class="welcome-area">
				<div class="welcome-row">
					<span class="name-line">
						<span id="welcome-name"></span>
						<span class="edit-btn" onclick="openProfile()">✏️</span>
					</span>
					<div id="welcome-sub"></div>
				</div>
			</div>

			<!-- サイドウィジェット -->
			<div class="side-widget">
				<div class="mini-card">
					<div class="mini-title">状態</div>
					<div class="mini-value">--</div>
				</div>
			</div>
		</div>

		<!-- コンテンツ -->
    <div id="notice_board" class="notice">
      <p>📢 お知らせ：VoiceAura City β公開中</p>
    </div>

    <div id="weather_box"></div>

    <div id="content_area"></div>

    <div class="room-links">
      <button onclick="goHealth()">🏥 Health</button>
      <button onclick="goLab()">🎓 Lab</button>
      <button onclick="goTeam()">🏢 Team</button>
			<button onclick="openSettings()">⚙ 設定</button>
    </div>

  </div>

</div>

<!-- 🔊 環境音 -->
<audio id="bgm" loop></audio>

<div class="volume-box">
  🔊 音量
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">
</div>

<script src="/static/js/room.js"></script>

</body>
</html>
